spring:
  application:
    name: mongo-collector-service

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/?replicaSet=rs0}
      database: ${MONGO_DATABASE:collector_db}
      auto-index-creation: false

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/collector_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  mongo:
    watch:
      collection: ${MONGO_WATCH_COLLECTION:computer_components}

logging:
  level:
    am.wago.mongocollector: DEBUG
    org.springframework.data.mongodb: INFO
